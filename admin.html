<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Panel - Shamez Production</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    body { background: #080808; color: #F5F0E8; font-family: 'Montserrat', sans-serif; padding: 40px; margin: 0; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
    h1 { color: #C8971E; font-weight: 400; font-size: 32px; margin: 0; }
    .back-link { color: #8a8278; text-decoration: none; font-size: 14px; text-transform: uppercase; letter-spacing: 0.1em; transition: color 0.3s; }
    .back-link:hover { color: #C8971E; }
    
    .upload-container { background: #141414; padding: 30px; border: 1px dashed #C8971E; margin-bottom: 40px; border-radius: 4px; }
    .upload-container h3 { margin-top: 0; color: #E2B44B; font-weight: 400; }
    input[type=file] { margin-bottom: 15px; display: block; color: #8a8278; }
    
    .gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; }
    .item { background: #141414; padding: 12px; text-align: center; border: 1px solid rgba(200,151,30,0.2); border-radius: 4px; }
    .item img, .item video { width: 100%; height: 160px; object-fit: cover; margin-bottom: 12px; border-radius: 2px; }
    .item p { font-size: 11px; word-break: break-all; color: #8a8278; margin-bottom: 12px; }
    
    button { background: #C8971E; color: #080808; border: none; padding: 10px 20px; cursor: pointer; font-weight: 600; text-transform: uppercase; letter-spacing: 0.1em; border-radius: 2px; transition: background 0.3s; }
    button:hover { background: #E2B44B; }
    .delete-btn { background: transparent; color: #8a2e2e; border: 1px solid #8a2e2e; width: 100%; padding: 8px; }
    .delete-btn:hover { background: #8a2e2e; color: white; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Admin Dashboard</h1>
    <a href="/" class="back-link">← View Portfolio</a>
  </div>
  
  <div class="upload-container">
    <h3>Upload New Media</h3>
    <input type="file" id="fileInput" accept="image/*,video/*">
    <button onclick="uploadFile()">Upload File</button>
  </div>

  <h3 style="color: #F5F0E8; font-weight: 400; margin-bottom: 20px;">Current Portfolio Assets (<span id="assetCount">0</span>)</h3>
  <div class="gallery" id="gallery"></div>

  <script>
    async function fetchFiles() {
      const res = await fetch('/api/files');
      const files = await res.json();
      const gallery = document.getElementById('gallery');
      document.getElementById('assetCount').innerText = files.length;
      gallery.innerHTML = '';
      
      files.forEach(file => {
        const ext = file.split('.').pop().toLowerCase();
        const isVideo = ['mp4', 'mov', 'webm'].includes(ext);
        
        const item = document.createElement('div');
        item.className = 'item';
        
        const media = isVideo 
          ? `<video src="/assets/${file}" controls></video>`
          : `<img src="/assets/${file}">`;
          
        item.innerHTML = `
          ${media}
          <p>${file}</p>
          <button class="delete-btn" onclick="deleteFile('${file}')">Remove</button>
        `;
        gallery.appendChild(item);
      });
    }

    async function uploadFile() {
      const fileInput = document.getElementById('fileInput');
      if (!fileInput.files[0]) return alert('Select a file first!');
      
      const formData = new FormData();
      formData.append('file', fileInput.files[0]);
      
      const btn = document.querySelector('.upload-container button');
      btn.innerText = 'Uploading...';
      
      const res = await fetch('/api/upload', {
        method: 'POST',
        body: formData
      });
      
      if (res.ok) {
        fileInput.value = '';
        fetchFiles();
      } else {
        alert('Upload failed');
      }
      btn.innerText = 'Upload File';
    }

    async function deleteFile(filename) {
      if (!confirm('Are you sure you want to delete this media? It will be removed from the portfolio.')) return;
      
      const res = await fetch(`/api/files/${filename}`, { method: 'DELETE' });
      if (res.ok) {
        fetchFiles();
      } else {
        alert('Delete failed');
      }
    }

    fetchFiles();
  </script>
</body>
</html>
